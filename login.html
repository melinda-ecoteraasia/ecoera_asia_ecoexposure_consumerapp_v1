<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoExposure™ | Login</title>
  <style>
    :root { --bg:#f6f8f7; --card:#fff; --text:#1f2933; --muted:#6b7280; --border:#d7ded9; --accent:#0f766e; --accent-dark:#115e59; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    header { padding:22px 16px; background:linear-gradient(135deg,#0f766e,#164e63); color:white; }
    header h1 { margin:0 0 6px; font-size:1.45rem; }
    header p { margin:0; font-size:.95rem; opacity:.9; }
    main { width:100%; max-width:560px; margin:0 auto; padding:24px 16px; }
    .top-nav { margin-bottom:16px; }
    .top-nav a { color:var(--accent); font-weight:700; text-decoration:none; }
    section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; box-shadow:0 1px 6px rgba(0,0,0,.05); }
    h2 { margin:0 0 16px; font-size:1.2rem; }
    label { display:block; margin:12px 0 6px; font-size:.9rem; font-weight:700; }
    input { width:100%; padding:12px; border:1px solid var(--border); border-radius:10px; background:white; font-size:1rem; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    button { width:100%; border:none; border-radius:10px; padding:12px 14px; background:var(--accent); color:white; font-size:1rem; font-weight:700; cursor:pointer; }
    button:hover { background:var(--accent-dark); }
    button.secondary { background:#e5e7eb; color:var(--text); }
    button.secondary:hover { background:#d1d5db; }
    .full { grid-column:1 / -1; }
    .status { margin-top:14px; padding:11px 12px; border-radius:10px; background:#eef7f5; color:var(--muted); line-height:1.4; }
    @media (max-width:520px) { .actions { grid-template-columns:1fr; } .full { grid-column:auto; } }
  </style>
</head>
<body>
  <header>
    <h1>EcoExposure™</h1>
    <p>Log in or create an account to collect a new sample.</p>
  </header>

  <main>
    <div class="top-nav"><a href="./index.html">← Home</a></div>

    <section>
      <h2>Login</h2>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="name@example.com" autocomplete="email" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <div class="actions">
        <button type="button" onclick="signIn()">Log In</button>
        <button class="secondary" type="button" onclick="signUp()">Create Account</button>
        <button class="secondary full" type="button" onclick="forgotPassword()">Forgot Password</button>
        <button class="secondary full" type="button" onclick="signOut()">Log Out</button>
      </div>

      <div class="status" id="authStatus">Not logged in.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://hakezadejldlvfkaaxbs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_objAYX-6RRXLwOWra1a66g_dDthWovO";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    async function checkAuth() {
      const status = document.getElementById("authStatus");
      const { data, error } = await supabaseClient.auth.getUser();
      if (error) {
        currentUser = null;
        status.textContent = "Authentication check failed: " + error.message;
        return;
      }
      currentUser = data.user || null;
      status.textContent = currentUser ? `Logged in as ${currentUser.email}` : "Not logged in.";
    }

    async function signUp() {
      const status = document.getElementById("authStatus");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) {
        status.textContent = "Enter an email address and password.";
        return;
      }
      status.textContent = "Creating account...";
      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: "https://melinda-ecoteraasia.github.io/ecoera_asia_ecoexposure_consumerapp_v1/login.html"
        }
      });
      if (error) {
        status.textContent = "Sign-up error: " + error.message;
        return;
      }
      if (data.session) {
        status.textContent = "Account created and logged in. Opening New Sample...";
        window.location.href = "new-sample.html";
        return;
      }
      status.textContent = "Account created. Check your email to confirm your account, then return and log in.";
    }

    async function signIn() {
      const status = document.getElementById("authStatus");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) {
        status.textContent = "Enter your email address and password.";
        return;
      }
      status.textContent = "Logging in...";
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        status.textContent = "Login error: " + error.message;
        return;
      }
      currentUser = data.user;
      status.textContent = `Logged in as ${data.user.email}. Opening New Sample...`;
      window.location.href = "new-sample.html";
    }

    async function forgotPassword() {
      const status = document.getElementById("authStatus");
      const email = document.getElementById("email").value.trim();
      if (!email) {
        status.textContent = "Enter your email address first, then select Forgot Password.";
        return;
      }
      status.textContent = "Sending password reset email...";
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: "https://melinda-ecoteraasia.github.io/ecoera_asia_ecoexposure_consumerapp_v1/reset-password.html"
      });
      if (error) {
        status.textContent = "Password reset failed: " + error.message;
        return;
      }
      status.textContent = "Password reset email sent. Check your inbox and spam folder.";
    }

    async function signOut() {
      const status = document.getElementById("authStatus");
      const { error } = await supabaseClient.auth.signOut();
      if (error) {
        status.textContent = "Logout error: " + error.message;
        return;
      }
      currentUser = null;
      status.textContent = "Logged out.";
    }

    checkAuth();
  </script>
</body>
</html>
